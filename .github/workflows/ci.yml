name: CI

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Cache Next.js build output
        id: nextjs-build-cache
        uses: actions/cache@v4
        with:
          path: .next
          key: ${{ runner.os }}-nextjs-build-${{ hashFiles('yarn.lock', 'package.json', 'next.config.ts', 'tsconfig.json', 'next-env.d.ts', 'postcss.config.mjs', 'eslint.config.mjs', 'app/**', 'components/**', 'lib/**', 'emails/**', 'public/**') }}

      - name: Build
        if: steps.nextjs-build-cache.outputs.cache-hit != 'true'
        run: yarn build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('yarn.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox

      - name: Start Next.js server
        run: yarn start &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Playwright tests
        run: yarn playwright:test
        env:
          BASE_URL: http://localhost:3000

      - name: Run Percy visual snapshots
        if: ${{ env.PERCY_TOKEN != '' }}
        run: npx percy exec -- yarn playwright:visual
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 smoke test
        run: k6 run k6/smoke.js
        env:
          BASE_URL: http://localhost:3000

      - name: Upload k6 summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-summary
          path: k6-report.html
          retention-days: 30

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test'
    environment: ${{ github.ref == 'refs/heads/main' && 'Prod' || 'Test' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Publish Playwright report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: ${{ github.ref == 'refs/heads/main' && 'playwright-report' || 'playwright-report-test' }}

      - name: Deploy to Coolify
        env:
          URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          TOKEN: ${{ secrets.COOLIFY_GITHUB_API_TOKEN }}
        run: |
          if [ -z "$URL" ] || [ -z "$TOKEN" ]; then
            echo "::error::COOLIFY_DEPLOY_URL or COOLIFY_GITHUB_API_TOKEN missing in this environment"
            exit 1
          fi
          curl -fsS -o /dev/null -H "Authorization: Bearer $TOKEN" "$URL"
