name: CI

on:
  push:
    branches: [main, test]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute branch tag
        id: branch-tag
        run: |
          ref="${{ github.head_ref || github.ref_name }}"
          echo "value=${ref//\//-}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ steps.branch-tag.outputs.value }}
          build-args: |
            GIT_BRANCH=${{ steps.branch-tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --name app -p 3000:3000 \
            -e ADMIN_DEV_BYPASS=true \
            -e DISABLE_EMAIL=true \
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('yarn.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox

      - name: Run Playwright tests
        run: yarn playwright:test
        env:
          BASE_URL: http://localhost:3000

      - name: Run Percy visual snapshots
        if: ${{ env.PERCY_TOKEN != '' }}
        run: npx percy exec -- yarn playwright:visual
        env:
          BASE_URL: http://localhost:3000

      - name: Container logs on failure
        if: failure()
        run: docker logs app || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 smoke test
        run: k6 run k6/smoke.js
        env:
          BASE_URL: http://localhost:3000

      - name: Upload k6 summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-summary
          path: k6-report.html
          retention-days: 30

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:${{ steps.branch-tag.outputs.value }}

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test'
    environment: ${{ github.ref == 'refs/heads/main' && 'Prod' || 'Test' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Publish Playwright report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: ${{ github.ref == 'refs/heads/main' && 'playwright-report' || 'playwright-report-test' }}

      - name: Deploy to Coolify
        env:
          URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          TOKEN: ${{ secrets.COOLIFY_GITHUB_API_TOKEN }}
        run: |
          if [ -z "$URL" ] || [ -z "$TOKEN" ]; then
            echo "::error::COOLIFY_DEPLOY_URL or COOLIFY_GITHUB_API_TOKEN missing in this environment"
            exit 1
          fi
          curl -fsS -o /dev/null -H "Authorization: Bearer $TOKEN" "$URL"
